name: Windows
on: 
  # push代码时触发workflow
  push:
    paths:
      - '*.pro'
      - '**'
      - '.github/workflows/windows.yml'
  pull_request:
    paths:
      - '*.pro'
      - '**'
      - '.github/workflows/windows.yml' 
jobs:
  build:
    name: Build
    # 运行平台， windows-latest目前是windows server 2019 
    # 参考文档 https://github.com/actions/virtual-environments/blob/main/images/win/Windows2019-Readme.md
    runs-on: windows-2022
    strategy:
      # 矩阵配置
      matrix:
        include:
          # 6.11.1 参考 https://mirrors.cloud.tencent.com/qt/online/qtsdkrepository/windows_x86/desktop/qt6_6111/
          - qt_ver: '6.10.3'
            qt_arch: win64_msvc2022_64
            msvc_arch: x64
          
    env:
      targetName: OCAuxiliaryTools.exe
      VERSION: Win64
      orgName: OCAT
      
    # 步骤
    steps:
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ matrix.qt_ver }}
          arch: ${{ matrix.qt_arch }}
          cache: false

      # 拉取代码
      - uses: actions/checkout@v2
        with:
          fetch-depth: 1

      # 动态获取VS路径
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc_arch }}

      - name: Verify Qt tools
        shell: pwsh
        run: |
          Get-Command qmake | Format-List
          Get-Command windeployqt | Format-List
          qmake -v

      # msvc编译
      - name: msvc-build
        id: build
        shell: cmd
        run: |
          mkdir bin
          set QMAKE_MSC_VER=1930
          set PATH=C:\Qt\6.10.3\msvc2022_64\bin;%PATH%
          qmake "QMAKE_MSC_VER=1930" -spec win32-msvc OCAuxiliaryTools.pro
          nmake
          echo winSdkDir=%WindowsSdkDir% >> %GITHUB_ENV%
          echo winSdkVer=%WindowsSdkVersion% >> %GITHUB_ENV%
          echo vcToolsInstallDir=%VCToolsInstallDir% >> %GITHUB_ENV%
          echo vcToolsRedistDir=%VCToolsRedistDir% >> %GITHUB_ENV%
      # 打包 
      - name: package
        id: package      
        env:
          archiveName: ${{ env.orgName }}-${{ env.VERSION }}
          msvcArch: ${{ matrix.msvc_arch }}
        shell: pwsh
        run: |
          & scripts\windows-publish.ps1 ${env:archiveName} ${env:targetName}
          # 记录packageName给后续step
           $name = ${env:archiveName}
           echo "::set-output name=packageName::$name"       
      # tag 查询github-Release
      # 上传artifacts          
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.packageName }}
          path: ${{ steps.package.outputs.packageName }}.zip
          
      # tag 上传Release
      - name: uploadRelease
        if: startsWith(github.event.ref, 'refs/tags/')
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ${{ steps.package.outputs.packageName }}.zip
          asset_name: ${{ steps.package.outputs.packageName }}.zip
          tag: ${{ github.ref }}
          overwrite: true 
