name: Windows
on: 
  # pushд»Јз Ғж—¶и§ҰеҸ‘workflow
  push:
    paths:
      - '*.pro'
      - '**'
      - '.github/workflows/windows.yml'
  pull_request:
    paths:
      - '*.pro'
      - '**'
      - '.github/workflows/windows.yml' 
jobs:
  build:
    name: Build
    # иҝҗиЎҢе№іеҸ°пјҢ windows-latestзӣ®еүҚжҳҜwindows server 2019 
    # еҸӮиҖғж–ҮжЎЈ https://github.com/actions/virtual-environments/blob/main/images/win/Windows2019-Readme.md
    runs-on: windows-2022
    strategy:
      # зҹ©йҳөй…ҚзҪ®
      matrix:
        include:
          # 6.11.1 еҸӮиҖғ https://mirrors.cloud.tencent.com/qt/online/qtsdkrepository/windows_x86/desktop/qt6_6111/
          - qt_ver: '6.10.3'
            qt_arch: win64_msvc2022_64
            msvc_arch: x64
          
    env:
      targetName: OCAuxiliaryTools.exe
      VERSION: Win64
      orgName: OCAT
      
    # жӯҘйӘӨ
    steps:
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ matrix.qt_ver }}
          arch: ${{ matrix.qt_arch }}
          cache: false

      # жӢүеҸ–д»Јз Ғ
      - uses: actions/checkout@v2
        with:
          fetch-depth: 1

      # еҠЁжҖҒиҺ·еҸ–VSи·Ҝеҫ„
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc_arch }}

      - name: Verify Qt tools
        shell: pwsh
        run: |
          Get-Command qmake | Format-List
          Get-Command windeployqt | Format-List
          qmake -v

      # msvcзј–иҜ‘
      - name: msvc-build
        id: build
        shell: cmd
        run: |
          #call "%ProgramFiles%\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" ${{ matrix.msvc_arch }}
          qmake
          nmake
          echo winSdkDir=%WindowsSdkDir% >> %GITHUB_ENV%
          echo winSdkVer=%WindowsSdkVersion% >> %GITHUB_ENV%
          echo vcToolsInstallDir=%VCToolsInstallDir% >> %GITHUB_ENV%
          echo vcToolsRedistDir=%VCToolsRedistDir% >> %GITHUB_ENV%
      # жү“еҢ… 
      - name: package
        id: package      
        env:
          archiveName: ${{ env.orgName }}-${{ env.VERSION }}
          msvcArch: ${{ matrix.msvc_arch }}
        shell: pwsh
        run: |
          & scripts\windows-publish.ps1 ${env:archiveName} ${env:targetName}
          # и®°еҪ•packageNameз»ҷеҗҺз»ӯstep
           $name = ${env:archiveName}
           echo "::set-output name=packageName::$name"       
      # tag жҹҘиҜўgithub-Release
      # дёҠдј artifacts          
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.packageName }}
          path: ${{ steps.package.outputs.packageName }}.zip
          
      # tag дёҠдј Release
      - name: uploadRelease
        if: startsWith(github.event.ref, 'refs/tags/')
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ${{ steps.package.outputs.packageName }}.zip
          asset_name: ${{ steps.package.outputs.packageName }}.zip
          tag: ${{ github.ref }}
          overwrite: true 
